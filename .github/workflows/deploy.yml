name: Deploy to VM

# Auto-deploys apps/web to the GCE VM (ai-program-week) on push to main.
# Builds the Next.js standalone bundle on the GitHub-hosted (glibc) runner, then
# rsyncs it to the VM via a command-restricted deploy key. The VM's web-reload
# .path unit notices the bundle change and restarts the `web` Podman container.
#
# Secrets (set via gh, account zane-tv):
#   VM_SSH_KEY          - private ed25519 key; authorized on the VM with a forced
#                         command (rsync into /srv/event-copilot/app + touch marker)
#   VM_HOST             - 35.229.228.183
#   VM_USER             - zens
#   VM_SSH_KNOWN_HOSTS  - ssh-keyscan output pinning the VM host key

on:
  push:
    branches: [main]
    # Redeploy when the bundle OR the VM-side pipeline source changes.
    paths:
      - "apps/web/**"
      - "packages/**"
      - ".github/workflows/deploy.yml"
      # crawl-ingest pipeline source synced to /srv/event-copilot/repo
      # (scripts/** covers package-standalone.sh too):
      - "craw_data1/**"
      - "scripts/**"
      - "drizzle/**"
      - "infra/vm/**"
  workflow_dispatch: {}

concurrency:
  group: deploy-vm
  # Never cancel a deploy mid-flight: the rsync is an in-place --delete into the
  # live read-mount, so a cancelled deploy could leave a half-synced bundle the
  # running container then serves. Queue instead — each deploy runs to completion.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (Next.js standalone)
        # NEXT_PUBLIC_* are inlined into the browser bundle at BUILD time, so the
        # Firebase web config must be present here (the VM only sees runtime env).
        # These values are public-by-design (client SDK config); the server-side
        # service account stays a runtime-only secret in the VM web.env.
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_VAPID_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_VAPID_KEY }}
        run: bun run build

      - name: Package standalone bundle
        run: bash scripts/package-standalone.sh dist/standalone

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.VM_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy bundle to VM
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          RSH="ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o UserKnownHostsFile=~/.ssh/known_hosts"
          # Sync the freshly packaged bundle. --delete keeps the remote dir in
          # lockstep with the build (no stale chunks). The deploy key's forced
          # command runs rrsync confined to /srv/event-copilot, so dest paths are
          # RELATIVE to that root — `app/` resolves to /srv/event-copilot/app/.
          rsync -az --delete -e "$RSH" dist/standalone/ "${VM_USER}@${VM_HOST}:app/"
          # Touch the marker → the VM's web-reload .path unit restarts the web
          # container. (Separate forced-command branch; not via rrsync.)
          $RSH "${VM_USER}@${VM_HOST}" 'touch /srv/event-copilot/app/.deployed'

      - name: Sync pipeline source to VM (/srv/event-copilot/repo)
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          RSH="ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o UserKnownHostsFile=~/.ssh/known_hosts"
          # The crawl-ingest one-shot, d1shim, and seed scripts all run from the
          # repo source mounted at /srv/event-copilot/repo. Keep it in lockstep
          # with main so a deploy also ships pipeline/script/migration changes.
          # The deploy key's forced command runs rrsync confined to
          # /srv/event-copilot, so the dest is RELATIVE (`repo/`).
          #
          # EXCLUDES are critical:
          #  - runtime/build junk (node_modules, .next, dist, .venv, __pycache__)
          #  - craw_data1/data/history + logs: ephemeral crawl artifacts.
          #  - We KEEP craw_data1/data/latest (committed last-known-good baseline
          #    used by crawl-ingest.sh to prime the crawl-data volume).
          # --delete is safe here: the live crawl output lives on the `crawl-data`
          # podman VOLUME, never inside repo/, so it can't be nuked. We do NOT pass
          # --delete-excluded, so VM-side history/logs/.venv are also protected.
          rsync -az --delete -e "$RSH" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude 'dist' \
            --exclude '**/__pycache__' \
            --exclude '*.pyc' \
            --exclude 'craw_data1/.venv' \
            --exclude 'craw_data1/logs' \
            --exclude 'craw_data1/data/history' \
            --exclude '.slim' \
            --relative \
            ./craw_data1 ./packages ./scripts ./drizzle ./infra/vm ./package.json ./bun.lock ./tsconfig.base.json ./biome.json \
            "${VM_USER}@${VM_HOST}:repo/"

      - name: Verify site is up
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          # Give the container a few seconds to restart, then check the public URL.
          sleep 12
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 https://aabw.devlab.vn/api/now)
          echo "https://aabw.devlab.vn/api/now -> $code"
          test "$code" = "200"
