# Event Copilot — nginx reverse proxy + TLS terminator for aabw.devlab.vn.
# Place at /etc/nginx/sites-available/event-copilot and symlink into sites-enabled.
#
# DEPLOY ORDER (important): this repo conf is HTTP-only. After copying it into
# place, run `certbot --nginx -d aabw.devlab.vn` to (re)inject the TLS lines +
# the :80→:443 redirect IN PLACE. Do NOT copy this file over a live conf that
# certbot has already edited without re-running certbot, or you drop TLS. The
# /covers + /venues block below is in both the repo and the live conf, so it
# survives a certbot reinstall.
#
# certbot --nginx will inject the ssl_certificate lines + the :80→:443 redirect.
#
# Critical for the AI streaming routes (/api/chat ~30s, /api/plan ~120s):
#   proxy_buffering off + http/1.1 + cleared Connection header, or the stream is
#   withheld/truncated. The app also emits X-Accel-Buffering: no on streamed routes.

server {
    listen 80;
    listen [::]:80;
    server_name aabw.devlab.vn;
    # certbot will add the HTTPS redirect here after issuing the cert.

    # Session covers + venue images are served DIRECTLY from a host dir that the
    # crawl-ingest loop refreshes (/srv/event-copilot/static/{covers,venues}),
    # NOT from the Next bundle. This lets newly-crawled covers appear without a
    # web rebuild (matches the snapshot hot-reload pattern). These locations match
    # before the `/` proxy, so Next never sees /covers or /venues requests.
    # Short max-age + must-revalidate (NOT immutable): filenames are stable and
    # overwritten in place, so the PWA's StaleWhileRevalidate must be able to
    # re-pull an updated cover.
    location ~ ^/(covers|venues)/ {
        root /srv/event-copilot/static;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        try_files $uri =404;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PWA: allow a reasonably large upload (push payloads etc.) but cap abuse.
    client_max_body_size 2m;
}
