# Event Copilot — nginx reverse proxy + TLS terminator for aabw.devlab.vn.
# Place at /etc/nginx/sites-available/event-copilot and symlink into sites-enabled.
# certbot --nginx will inject the ssl_certificate lines + the :80→:443 redirect.
#
# Critical for the AI streaming routes (/api/chat ~30s, /api/plan ~120s):
#   proxy_buffering off + http/1.1 + cleared Connection header, or the stream is
#   withheld/truncated. The app also emits X-Accel-Buffering: no on streamed routes.

server {
    listen 80;
    listen [::]:80;
    server_name aabw.devlab.vn;
    # certbot will add the HTTPS redirect here after issuing the cert.

    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PWA: allow a reasonably large upload (push payloads etc.) but cap abuse.
    client_max_body_size 2m;
}
